body:
  text: 輿地碑記目目録類二金石之屬提要臣等謹案輿地碑記目四卷宋王象之撰象之金華人嘗知江寧縣其書乃以天下碑刻地志之目分郡編次而各注其年月姓氏大略於下起臨安訖龍州皆南渡後疆域其中頗有考訂精確者如鎮江府丹徒梁太祖文皇帝神道碑辨其為梁武帝父成都府殿柱記作於漢興平初年知其非鍾會書嘉定府移水記有嘉州二字知其非郭璞筆台州臨海慶恩院定光院明智院明恩院婺州義烏真如院諸碑福州烏石宣威感應王廟碑並書會同則知吳越實曽用契丹年號皆見證據然亦有前後復出並承訛襲謬者如上霄峯夏禹石刻南康軍已載之又載之江州且安知所云隱起百餘言者非即水經注秦始皇所記乎孔子延陵十字碑鎮江府既兩載之又載之江隂軍又載之昌州且烏知所云嗚呼有吳延陵季子之墓者古法帖所録乃止有六字乎至於徽州則載歙州折絹本末一事澧州則載柿木成文太平字皆於碑志無涉頗屬不倫又思州下獨載夏總幹墓志略一篇大書附入體例更為參錯疑是當時隨筆雜記編纂未成之書特所採金石文字與他書互有出入皆可以備參考而圖經輿記古無著録専家流傳頗少此本搜輯頗詳尤能補厯代史志所遺缺也乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4ced17eef4cb5c10b2264a745d92db6511d6a29c54fc1f8e36b650503f9d8da7
