督李襲志墓碑永徽五年碑墓在真符縣唐衡州刺史李公孝儒之碑永徽三年碑墓在真符縣周洋州司馬李正亮墓碑唐聖厯中碑華陽塞磨崖刻駱谷路華陽塞下有大溪俟冬水落則見大字刻之道傍云建中三年造此得意閣回河鎮同節度副使張大使記山南西道節度使南陽張公清德美化之碑梁國喬琳撰上柱國隂冬曦書李公名獻恭與鄴侯李泌實推薦之蓋肅宗時人也唐德宗復洋州租賦詔德宗之回鑾也降詔以復洋州之賦曰朕巡狩山南自春涉夏師旅殷會持費既廣州閭抒軸嵗計其空東作效時西成罕望雖黽勉從事人不告勞而憫悼積中豫實知愧昨者減其租稅優以復除庶乎有瘳汔用小息洎朕言旋修躬復畏途絶䃹索闕回危棧綿亘時經霖雨道阻且修工徒造舟縣人嘗路靡間耋老莫獲寧居而又齎負糗糧供備頓舍涉於千里飫我六師居人露處以同依宿闕麥過時而不穫覩兹妨奪彌增感傷前所復除未足酬恤式敷惠澤以舒大勞洋州除先減放秋稅外給復一年嗟乎古先哲王東征西怨顧豫不德重以勞人補費録勤是有寬恤申命長吏明加優諭稱朕意焉此陸贄之詞也唐德宗升洋州為望州詔貞元元年德宗幸興元道出洋州後升洋州為望州詔曰自昔多虞順時而動古公避狄兆永祚於岐下髙帝徒蜀建雄啚於漢中王迹所興子孫是奉覩遷居之遐阻知政業之艱難矧天下為家不常厥邑王者所至四方會同崇號設都於是乎在朕遭罹冦難播越梁岷蒸庶煩於供億武徒勤於扞衛凡百執事各欽厥司人皆競勸物以豐給嘉乃成績豫眷不忘今大憝已除京邑甫定將旋法駕展敬園陵眷於是邦復我興運宜其崇大以示將來洋州冝升為望州此陸贄之詞也重興營田務並懷昌堰記蜀廣政二年節度使吕彥珂立判官王曉撰銜內帶源壁等州處置使則是時洋州改為源州明矣碑子渡碑乾祐真符兩界之間碑子渡有唐僖宗時一碑二首當中云乾符四年四月八日餘題漢陽長安兩縣施主名字耳明妙菴記文同與可文也丹淵集中此篇今見洋州志洋州記鄭鄖序金州碑記干祿字碑唐顔魯公干祿字碑在郡治之蓬萊堂顔魯公書碑刻顔魯公為蓬州長史在蓬四年往來新政縣鮮于氏家為書離推記今在縣之西南崖石間又書鮮于仲通里門記復以小字書之磨崖碑廣數丈今又大書皆在崖石間自書崖石故舊體尤為精妙安祿山題在透明巖大唐先天二年安祿山造彌勒佛一龕祈來云云象之按唐即史祿山傳祿山死於至德二載年五十餘而先天二年開元元年嵗次癸丑下及至德有二載嵗在丁酉已四十五年以年月考之祿山是時未及十嵗不應入蜀祈福此可疑者一也又祿山傳載張守圭為幽州莭度日祿山以盜羊獲罪當死守圭壯而釋之通監開元二十年張守圭始為幽州莭度而開元二十四年張守圭始執祿山赴京師不應開元元年已曽入蜀此可疑者二也以相傳之久兼恐别有姓名偶同姑兩存之福緣寺唐碑在蓬池縣西五十步敘碑云唐大中七年蓬州刺史吳延述賈氏本支碑在蓬池縣之輯瑞院院有古碑字畫磨滅無餘不可考其題云丨丨丨丨四大字極精明蓬之諸賈或祖於此云石佛院碑在營山院之西北四十里有古碑云開寶六年丙子朔蓬州即池縣石佛院記大蓬山天寶碑在良山縣之大蓬山秀立觀元祐中何彥國詩云誰向山隂漫刻鐫兩山日炙𨽻文全依稀記得升平事天寶猶題十二年咸通中石碑在伏虞縣之延真觀天尊祠中有小石僅有咸通中葺之五字可辨考景福寺碑在良山縣南十里大蓬山上有唐昭宗天復八年修寺立之碑耳方等院碑在蓬山縣載蓬山本漢宕渠縣地至德二年徙其縣併入營山有古彌勒殿按碑云大隋創建偽蜀廣政二十一年更新羅漢閣記在樓溪觀音院戊子端拱元年刻石咸安志李曄序大安軍碑記九井灘記九井灘有大石三其名魚梁龜堆芒鞋觜危參差相望於波間操舟人力不勝舟而輒為石所觸故抵於敗誠今絶江為長堤度其南别為河道以分水𫝑則北流水益減而石出矣以火煆醘沃金鎚隨擊之宜可去如其言治之明年三大石不復見而九井遂平元祐五年轉運陳鵬記龍洞記自三泉西二里見有若觀闕者當其前迫而視之則洞也其深七十三步廣半之其兩旁石壁之嵌空突怒者若目鼻口麟腳甲跟肘甚具其下皆平石為底水文其上若鋪管簟石墮其間若設爼豆其兩崖皆瘦木翠蔓附石羅生萎㽔下覆若綴纓絡木蔓之間布水之道后先交映若垂冕旒水落石底其勢跳㵼與石相鬪若濺玉雪其聲鏘鳴與洞相應若響琴築清寒幽邃殆非人境劔門關碑記修關石刻在天成五年四月又有五代勑牒甚多皆天成長興廣政間牒也唐碑在劔門山嶺有一寺曰梁山寺産茶亦為蜀中竒品東坡南行録題木櫪觀詩有云飛簷如劔寺之語其下注云出劍門東望有一寺山巔樓閣隱隱可見有一二碑皆磨滅正丨丨也劍門銘李文饒集云丨丨丨注劍門當中有一岑峻領橫峙望若蕭屏北一峯最竒而説者未嘗及也故銘云羣山西來波積雲屯地險所會斯為蜀門層岑峻壁森若戈戟萬壑奔東雙飛髙闕翠嶺中橫黯然黛色樹若雄屏以衛南國唐升明題劍門貞元二年張允書碑在關之棄繻亭之南百步唐劔門山記有碑在關之內棄繻亭之南百步唐盧照鄰悟本寺記在故臨津縣悟本寺唐劔門制置之記廣明元年立碑在關之內棄繻亭之南百步唐劍閣碑李復撰趙清獻公留題在志公寺沔州碑記栁宗元作興州水運記昔丨丨丨丨丨丨丨丨丨以為轉巨石仆大木焚以炎火沃以食醯摧其堅剛化為灰燼畚鍤之下易其朽壞武興集普慈唐舜思序郙閣漢銘文同題靈岩寺詩云南征曽讀涪溪誦西遡今觀丨丨銘唐刺史行記興州刺史當行規河中府參軍裴思南虔士劉倣進士孟元旗大唐開成三年階州碑記闕成州碑記漢武都太守漢陽阿陽李翕磨崖頌翕諱君羡開平道路作磨崖頌漢建寧四年造今碑在魚窮峽漢天井山記亦漢陽太守李翕建寧五年造今藏碑之家亦惟有前一碑四年所立者後一碑五年所立者少有之又老農云往年雷震崖石仆地此碑不知所在是可惜也漢耿勳碑漢成都太守扶風茂陵耿勳為守以熹平三年立碑又同谷志云後漢建寧四年武都太守李龕修道記并黃龍白鹿嘉禾甘露木連理石刻建寧五年天井山修道記熹平三年太守耿勳政迹記并題名記並在封泉保魚峽隋楊將軍墓碑在州覀十里舊圖經載隋大將軍岩州總管茂林楊氏墓碑天祐中州庠取是以刻文會得他石乃再立于將軍墓側唐漢陽太守趙承碑秦府法曹楊景撰開元十二年建唐刺史劉公重修水亭記大順元年節度副使劉崇魯述唐李彥琛修經閣碑在鳯凰山有唐天復七年天雄軍指揮使知成州李彥琛修經閣碑判官為汶撰天復七年即天祐四年是年二月唐禪於梁彥琛稱天復七年猶稟唐之正朔也亦可尚也大雲寺石碑在鳯凰山上去州七里創始莫考殿后崖上有刻字云漢永平十二年又經閣崖刻云梁大同九年西和州碑記聖德寺記集古録唐戴正倫撰梁肅書碑以貞元二十年立在鳯州王仁裕墓碑有貞女墓在河池縣地朱梁時為梁將所得義不汚辱梁將不敢犯見丨丨丨丨丨王欽若韓琦王振辰留題在皂莢驛文同任師張浮休留題在興唐寺鳯州碑記圖經郡守張仕佺修隋朗法禪師碑見在釋門文州碑記同昌郡驛碑毯㲙驛在州覀四十里唐天寶四年置同昌縣主簿趙齊記有碑和太尉墓碑墓在今城覀大渡埧偽蜀殿中侍御史文谷碑太尉名文為唐德興軍莭度使文州馬步軍都虞候大中五年卒葬於此省倉梁記唐咸通三年刺史秦述謨建譙門外文州古今志郡守楊槱編文州續志郡守杜孝嚴編龍州碑記𢎞真觀古碑在江油縣南一百三十四里太華山之登真觀此記最古不記撰人姓名牛心山靈異記在牛心之顯濟廟即李龍仙廟也廟碑不載撰人名氏龍門志楊熹序續志宋之源序輿地碑記目卷四
