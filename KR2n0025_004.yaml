body:
  text: 輿地碑記目卷四晉王象之撰南劍州碑記仙書石在劍浦縣之東蕭坑之前或指為仙書湆澹院留題在劍浦玅峯閣上有蔡襄題字及李孝彦草書賈青詩曰溪聲灘外急草色雨中深客意自南北山光無古今虎頭巖記在將樂縣南龜山楊時記鎮國廟中碑見古蹟門寳華院記在將樂南十五里有偽閩王氏銅鍾天王院留題在沙縣壁間有唐韓渥題詩延平志廖挺編胡舜舉序尤溪縣新學記晦翁文邵武軍碑記王氏石銘夷堅志云邵武人危氏者大觀二年塟其親於郡西塔院下路傍踰月雨過視坟側隠然有㾗掘之得銀酒杯二銅水鉢及鏡銘一又得埋銘石其文曰琅琊王氏女江南熙載妻丙申閠七月塟在石城西諸器皆依古而製度精巧非世工可及吏隠堂銘葉儀鳯撰云樵溪之水清漱玉樵嵐之山翠可掬溪水之湄山之足上有寒梅擁修竹武陽志髙光編葛鴻序樵川集黄璋序李丞相祠堂記在軍學晦翁序興化軍碑記石敢當碑慶厯中張緯宰莆田再新縣治得一石銘其文曰石敢當鎮百鬼壓災殃官吏福百姓康風教盛禮樂昌大厯五年縣令鄭和字記今人家用碑石書曰丨丨丨三字鎮於門亦此風也仙篆石在莆田縣北十里陳崖山巨石坦平文跡縦横若篆書方翥陳岩詩云蟲文鳥篆不可識如讀岣嶁神禹碑石碑在莆田縣南十里嶺上有石平闊數尺上有鳥跡書文不可暁中峯庵記曽聞天台庵記云南山廣化寺有庵百餘區簷楹相摩軒檻層出如中峯瑞泉天宫號是為絶景成都府碑記漢蜀太守何君造尊健閣碑容齋随筆云在成都府其末云建武中元年漢王渙墓碑在新都縣北五里渙字穉子東漢循吏也家前有二石闕其一題漢故兖州刺史雒陽令王君稚子之闕其一題云漢故先靈侍御史河内縣令王君稚子之闕漢文翁學生題名集古録不著書人名氏文翁題名可見者凡一百十二人碑在益州漢文翁石柱集古録云漢𨽻不著書撰人名氏永初中火災被焚惟廟内兩石鈌存太守髙朕重立又於其東别築周公禮殿碑以初平五年立益州殿柱記先儒謂鍾㑹書非也鍾㑹是晉咸熈元年始入蜀距漢興平初禩已七十一年不應追書也今在禮殿東漢學殿嵗月記繋年録云紹興六年成都教授范仲殳奏䟽言本府學殿建扵東漢之初平漢人以大𨽻記其修築嵗月刻於東楹至今九百四十三年盖天下棟宇之古無過於此者髙宗皇帝御書大成殿榜繋年録云紹興六年上書大成殿榜賜成都府府學左存生題名歐陽公集古録謂為晉宋間碑晉益州刺史羅君碑在碑隂晉朱齡石刻宋髙祖檄譙縱文在石室館學廟堂記唐永徽元年賀公亮撰集古録謂不著撰人名氏不同州學廟堂頌唐神龍二年史燾撰文唐平蠻碑集古録云唐蕭晉用撰開元十九年刻石紀功在成都昭烈帝廟又容齋隨筆云成都有丨丨丨丨開元十九年南蠻為邊患明皇遣内常侍髙守信為南道招慰處置使以討之㧞其九城此事新舊唐書及野史皆不載肅宗以魚朝恩為觀軍容處置使憲宗用吐突承瓘為招討使議者􅏺其以中人主兵柄不知明皇用守信盖有以啟之也先主廟碑貞元四年蘓瑞撰在昭烈帝廟中韋臯寳國寺記貞元中立記叚文昌元和中律師銘共為一碑見在府學蠶市記韋南康文在葉陽縣寶厯寺寺有南康像最得其真武侯碑隂記集古録云唐崔偹撰元和二年武元衡刻及其寮属題名於武侯廟碑隂古栢行長慶四年段文昌文重冩前益州立長史真記李文饒撰昔益州草堂寺刋畫前長史十四人代稱絶跡余嘗於數公子孫之家獲見圖像乃知草堂繪事靡不逼真者余以精舍甚乆貌像將頽乃選其功徳尤盛者五人摹於郡之㕔記資福院記集古録云唐李徳裕撰長慶二年立諸葛武侯碑在昭烈帝廟中長慶四年裴度撰桞公綽書立石摠綰大學碑周益州刺史齊國公宇文憲頌徳碑也石室賛唐維州刺史鄭藏休撰大厯十年殿中侍御史李樞篆修文宣王廟碣㑹昌五年裴坦撰唐栁公權書金剛經在城嘉佑禪院唐僧大辯修功徳碑元和十五年立在文殊閣唐韋南康碑二並在大慈寺福殿中石本九經在府學容齋隨筆云皆孟昶時所刻其書淵世民三字皆闕畫盖髙祖太宗諱也龍興寺碑容齋隨筆云乃前蜀王氏時所立及唐諸帝皆平闕云髙駢築城記唐中和四年翰林王徽記在城中信相院孟知祥修城記後唐天成二年李昊記唐明皇追諡孔子册文本朝太平興國五年府尹辛仲甫立十賢賛今存其七姚崇賛冉伯牛宋璟賛冉有源乾耀賛閔子騫韋杭賛子貢陸餘慶賛子路盧從愿賛子㳺裴耀璀賛子夏觀政閣記秦漢至唐領太守刺史節度使之職有政績可考而畵像存焉得二十八人者别圖於他閣而榜曰觀政吕大防丨丨丨記成都志云畫像存焉二十有八人李氷文翁王遵張堪第五倫亷范和暠李膺髙肤諸葛亮王濬髙儉陸象先蘇頲嚴弋翟寕韋臯髙崇文武元衡叚文昌李徳裕楊嗣復杜琮魏謩牛篆夏侯孜髙駢陳敬瑄文翁等畫像十賛宋祁撰祠之内圖文翁嚴君平鄭子真司馬相如揚子雲蜀上先賢凡九及公之像而十常山公賛蘓文忠公留題成都志云極樂院有蘓文忠公壁間留題至和丙申季春二十八日眉陽蘓軾與弟蘓轍来觀盧楞伽筆跡今存成都古今前後記眉山人孫汝聽修成都古今前後記六十卷見眉州江卿志趙清獻公成都記見張有成光福寺記成都志袁説友序崇慶府碑記蜀先主碑在晉原縣西南二里唐房琯文唐李百藥碑在江原縣之萬嵗寺文字殘闕唐開元碑唐天寳八年碑在晉原常清觀鮮于仲通文唐開元皇帝送趙仙甫尊師歸蜀詩碑見在新津縣寶珍觀唐樊知遷碑在江原縣净居寺唐顔師古文今額殘缺翠圍山屏碑在永唐之翠圍寺文字殘缺萬嵗寺碑碑記具存見萬嵗寺註善頌堂留題見趙抃註范公鎮留題在太平院范公入蜀㳺岷山過此紀行於寺之經閣上云熈寧八年三月㳺青城間四日趍峩眉俱過此與百世相見百朋百臺侍行蜀郡公記法天寺留題見法天寺註蜀州刺史㕔壁記唐紀事詩云貞元十四年皇甫澈刺蜀州時賦四相詩序云蜀州刺史㕔壁記云居相位者前後四公謨明弼諧遷轉歴此顧已無取忝跡扵斯景行遺烈嗟嘆不足也謹述其行事詠其㮊羙庶將来君子知聖朝之徳云眉州碑記漢刻黄龍甘露之碑在彭山之黄龍鎮楊洪碑漢犍為太守丨丨丨在今彭山縣北小板橋楊中云五十年前除洪字其它皆磨滅不可考䆒今洪字亦無矣北平山碑在彭山縣之北平山大書北平山治之碑不可讀碑隂書大唐上元二年道士施仕衡等字南康郡王紀功碑唐貞元十三年建碑原在龍興寺乃皇太子誦書天聖五年移在州衙門外唐眉州剏羅城記唐大順三年盧極撰文眉州新移彭山縣記唐㑹昌五年樓旦撰文唐丹稜縣龍鶴山成錬師植松碑唐天寳元年嵗次庚寅建城東貢院佛殿中唐碑及五代碑城東寺殿宇建於唐時今為貢院中有古碑二堵象耳山李白留題夜来月下卧醒花影零亂滿人襟袖疑如濯魄扵氷壺也李白書杜子羙両川䕫峡諸詩石刻黄庭堅書詳見大雅堂下夷獠誓碑寰宇記云在洪雅縣市中大池院題去眉山縣一十里蘓文忠公嘗過之今柱上有手書云自老翁井還偶憇治平丁未十二月七日子瞻凡十八字州園十詠紹興間邵傳眉州古志孫汝聽編通義編家安國編江鄉志張伯虞編劉光祖序簡州碑記後周宇文㤗紀功碑碑在本州界首云㤗數遣都督入蜀一治石崗縣一治懐逺縣見簡池志郡守壁記名氏始唐貞觀十三年見劉左史折栁亭記韋南康紀功之碑在州治頌春亭側碑甚巨乃御製皇太子臣誦奉勑書唐乾符修城碑在州之城隍廟天光觀唐碑觀在陽安縣東三十里有唐碑可讀者云天和初三洞道士王道賜因張文舉施地基剏建羅漢院石刻在陽安縣有僧繼暉斬木開基而崖石呈露見石鐫羅漢等像有碑曰唐興元元年禪師道明鐫刻以為禪宫靈岩縣院石刻在平泉縣西南二十五里院中石刻字乃元和長慶間周文王廟碑在陽安縣西北上十五里即後周髙祖文帝之廟舊碑題額云大周植其碑元年嵗次丁丑造元年即后周閔帝之初元也今石刻存焉北岩院碑院有唐碑其嵗月乃大厯時重修云聖居院碑唐中和年建嘉定府碑記漢楊宗暢墓碑墓在夾江縣東十里墓前両闕其左𨽻書漢故益州太守楊府君諱徳字仲墓道十六字漢和帝時開道碑在夾江縣西蜀郡青衣越嶲道界中有永和七年永和八年等字漢靈帝時張道陵碑在洪雅縣易俗鄉上有嘉平二年三月一日等字沐川古碑唐垂拱三年玉津令馬元慶等殺馬湖夷賊紀功今存李徳裕石闕舊市鎮有名灘曰墨崖其上有唐李徳裕領重兵過此九字孝女碑在犍為清溪口楊洪山下東漢永建初孝女叔先䧺以父泥和􅣹湍水屍䘮不歸䧺於父溺處自投水死後五日與父尸相持浮江上郡表言為䧺立碑國朝元祐中重立都安王廟碑碑載隋開皇九年置青衣縣後周保定二年置青州宣政二年始為嘉州靈鷲山碑唐貞元年僧乾光為其師道真令徐宗彛撰碑而碑刻於長慶中韋南康大像碑在凌靈寺大像之左郭璞移水記記謂世至播遷戎羯亂華於是優㳺笑傲放意於山水間休於嘉州城東百歩烏尤山鑿書岩而蘓子由詩亦指其注尔雅於此史謂無入蜀之文謹按移水記有嘉州二字則非璞之手筆恐後人之附㑹耳盖嘉州之名始於後周而自周已前止曰漢嘉郡曰龍㳺縣耳安得有所謂嘉州哉或者後人追書則未可知耳當攷張無盡沐川寨記其畧云南蠻東北接境常挟吐蕃以為中國患盖其路一出大渡河一出沐川源一出馬湖江等其狭邪之徑曰榮涇曰八靣箐曰黒水曰中鎮曰頼因曰龍水曰隂川而沐川之路常為嘯集之地申孝友西南㑹要孝友論唐自開元之際始有南詔之憂盖六台詔而南詔最强連吐蕃而蜀患乃酷降及太和之際李徳裕作籌邊樓南詔頗有所憚而蜀頼之以安今西南諸蕃自祖宗以来以迄扵今隔阻大蕃之要道實為蜀部之蕃籬是致雲吐之三蕃不復疥疽於中國今邊夷近屬雖衆且㣲然而勢合則强力分則弱必離其黨使不得親分其勢使不得不弱斯可矣嘉定志郭公益編續志林潔已編嘉定詩岑参編雅州碑記漢蜀郡太守治道記其碑在榮經縣西三十里建武中元二年立羊竇道碑在嚴道縣東三十里漢永初六年碑也漢故檢校巴郡太守樊府君碑建安十年三月上旬造髙孝亷墓碑在嚴道縣東二十里按其碑年月乃漢建安十四年髙君兄弟皆孝亷有二大闕其一曰故益州太守武隂令上計史舉孝亷諸部從事髙頤字貫方其一曰漢故益州太守隂平都尉武陽令北府丞舉孝亷髙君實字貫光又一大碑其首云故益州太守髙君之碑卭崃闗開路記天寶六年章仇兼瓊記龍興寺碑在州城外有唐咸通四年再建丨丨丨丨吳行魯建又有二蘓先生墨蹟亦在于本寺平羌江䋲橋碑在巖道縣平羌橋有唐咸通十年上官朴所撰碑字亦𨽻體今在江瀆廟兩靣碑在盧山縣南五里與府君碑甚近碑靣與背皆有篆文嵗乆訛缺不可識或辦其文曰盧山縣碑尊徤閣記建武中元二年其碑在榮經縣西三十里景峪縣崖間㢲岩李燾有䟦以辯正年譜且言按後漢記建武二十三年夏四月改為中元無建武字又按祭祀志改建武二十三年為建武中元元年以此知記與志合而紀失之矣神水閣記在榮經縣東三十里銅山夾中碑字乆磨滅今也不復可考古老相傳其體大率如尊徤閣字云李白月下帖在郡治楊凝式詩帖在郡治魯直木蘭歌帖在郡治魯直梁甫吟帖在郡治雅安志李嗣文序威州碑記鼔角樓記唐維州軍事判官髙測文乾符五