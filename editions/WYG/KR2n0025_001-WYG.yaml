曰回車築二亭於南門之外左曰仁右曰智山水之所附也梁回十有二舟於两亭之間以通車徒之道築一亭於州門之左曰宴月言所以属賓也凢為城垣九千尺為屋八以楹數之得五百五十二自七月甲午卒九月丙戌為日五十二為夫一萬一千四百二十五洪蒭遊洞記曲書一郡山川之景皆洪所身親而足厯者也今附上饒志卷末唐曺君墓碑容齋五筆云慶元三年上饒尉陳莊發土得碑乃婦人為夫君所作君姓曺名因祖父皆仕於唐髙祖之朝惟公三舉不第居家以禮義自守及卒於長安之道朝廷公卿鄉鄰耆老故舊無不太息惟予獨不然謂其母曰家有南畆足以養其親室有遺文足以訓其子肖形天地間範圍隂陽之内死生聚散特世態耳何憂喜之有哉予周氏公之妻室也上饒志趙蕃編白上中序池州碑記大㕔壁記元和八年齊暎為守日建裴晉公作記於㕔壁今不存又韓贄文竇潏文刻漏記杜牧文夫子廟麟臺碑韋表物文紫極宫碑徐鉉文康濟廟記在建德徐鍇為之記昭惠廟墨勅昭惠廟在銅陵神姓張名寛嘗仕晉陽太守唐裴休以墨勅贈㳺擊將軍又以墨勅封保勝侯及保勝公今三勅俱存廟中開講詩集古錄鞏疇為講老子而作咸通九年楊巖刻石立於鞏疇之所居馬當山銘陸龜䝉文有云言天下之險者在山曰太行在水曰吕梁合二險之為一吾又聞乎馬當波之為險也屹乎大江之旁怪石憑怒跳波發狂日黯風助摧牙折檣幸而脫死神䰟飛揚殊不知堅輪蹄者夷乎太行仗忠信者通人乎吕梁使舟檝而行乎馬當合是三險而為一未敵小方寸之包藏題𤣥宗御書記集古錄張說題𤣥宗所書碑御製字并年月記及模勒刻字人姓名説所題者大慧禪師塔碑也侍巖記李芳𤣥撰𤣥宗書㑹昌四年刻杜牧題名者牧為池州刺史立左史洞之名而題之張祐書會昌五年刻在池州今同附於後唐孚貺侯廟碑容齋四筆云在銅陵縣唐中和二年立池陽前集吳蔚張古序池陽續集崇寧中畢漸序池陽前記政和八年范致明編池陽後記建炎四年張古序秋浦志胡兆序饒州碑記饒州刺史碑容齋三筆饒州良牧自吳至今以政績著者有九賢郡圃立祠以祀此外知名者蓋鮮白樂天集有吳府君碑唐紫極觀鐘銘在城紫極觀天寳九年上官經野文唐薦福寺庄田記乾興元年僧志全文唐能仁寺菩薩堂記南唐邊鎬文唐薦福寺碑冷齋夜話云范文正公守饒有書生獻詩甚工生自言平生未嘗飽時歐陽率更薦福寺碑墨本直千錢文正為打千本使售京師紙墨已具一也夕雷擊碎其碑東坡詩一夕雷轟薦福碑蓋謂是唐饒娥碑唐桞宗元文云饒姓娥名世漁鄱水娥為室女女事循整鄉閭式敬寳應中父醉漁溺死求屍不得娥走哭水上三日不食耳鼻流血氣盡伏死明日屍出黿魚鼉蛟浮死萬数縣旁水民悲感怨號會錢具葬娥於鄱水西横道上宗元為之記云唐魏仲兕饒娥碣在樂平唐魏惜饒娥碣在樂平南唐雙溪觀記在安仁乾德二年葉窰文唐自鳴山記在安仁唐咸通十年歐陽證吳羅漢寺記在安仁偽吳順義六年羅漢贊同上玉石寺記在安仁唐逢汝舟都頡七談容齋五筆云鄱陽素無圖經元祐六年餘干進士都頡作七談一篇其叙士風人物云張仁有篇徐濯有說顧雍有志王德璉有記其所引張徐顧王所著今不復存鄱陽志史定之序桞將軍墓碑在安仁唐咸通六年桞子厚與元饒州書見桞文鄱陽舊志輿地碑記目卷一
