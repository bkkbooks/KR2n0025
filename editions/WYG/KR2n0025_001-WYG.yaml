body:
  text: 輿地碑記目卷一宋王象之撰臨安府碑記吳太帝黃武二年刻字在栗山東晉孫文度鐫石銘在冨陽縣之雞籠山義熈八年立隱士郭文碑在臨安縣湖州刺史孫彭立天竺靈隱二寺記臨安志云寺記陸鴻漸文僧遵式立復州記圖經云陸羽常過錢塘撰丨丨丨丨丨丨冷泉亭記唐長慶二年白居易文西湖石函記唐史長慶四年白居易文胥山碑銘元和十年靈元輔文王遹書佛説尊勝陀羅尼呪牛僧孺八分書唐龍興寺碑即今祥符寺也景龍四年盧季詢書華嚴𤣥覺法師碑褚廷誨書任道真題李渉碣後舊在祥符寺臯亭神記牛僧孺書唐徑山禪師碑九域志云崔元翰詞李吉甫書下石龍浮勝院磨崖心印銘唐翰林學士梁肅文唐和州刺史凌凖墓誌在新城縣唐桞宗元文餘杭縣令劉允恭德政碑晏公類要云劉令􅊩事詳明臨下清簡人懷其惠吏畏其威陳允昇德政碑晏公類要云在餘杭縣唐貞元二年立中書舍人李紓文前縣令李復碑晏公類要云在餘杭縣唐大厯四年立祕書郎蔣志文赤松子銘晏公類要云在冨陽縣又云赤松子駕鹤時停北山唐縣令丁君德政碑晏公類要云在於濳縣西市山唐麟德二年立石壁法華經記在廣化寺唐元稹文真聖觀碑在天慶觀開平二年刻梁簡文石像記在靈隱寺司空相國詩在靈隱寺唐嵩嶽大師影堂記在靈隱寺鳥窠禪師塔銘在定業院唐白舍人鳥窠禪師問答頌在定業院唐宣宗悼安國寺悟空禪師碑在鹽官縣悟空禪師行業碑唐咸通二年盧求文凈明院功業碑在臨安縣錢武肅王書崇覺院錢武肅王開山碑在臨安縣錢王建興敎寺記在本寺吳越王立功碑在臨安縣乾化三年立吳越王生祠碑在臨安縣李淇撰乾化三年立錢塘龍王廟碑錢塘縣有廣潤龍王廟碑云錢鏐正明二年建觀音尊聖幢在九里松寳大二年建貢院前橋柱刻云寳正六年嵗在辛夘造此錢王三年號日天寳曰寳大曰保正皆錢王年號也又臨安府石屋崇化寺尊聖幢云時天寳四年嵗次辛未以年月攷之非唐之天寳乃錢王之年號耳葢梁以丁邜簒唐武肅是嵗猶稱唐天祐四年戊辰乃自稱年號曰天寳元年則天寳元年辛未乃梁之乾化元年也事見洪邁隨筆又通鑑唐明宗天成二年吳越王錢鏐以中國䘮亂朝㑹不通乃改元保正其後復通中國乃諱而弗稱杜太師稜築城記在新城縣寳大元年羅隱文羅給事墓誌在新城開平四年沈崧文吳越武肅王神道碑在臨安縣楊凝式撰長興二年立龍興寺華嚴經石記寳厯三年九月二十五日蘓州刺史白居易撰寺僧南操立胥山銘集古錄唐靈元輔撰王遹書山有子胥廟故以為名元和十年立在杭州𤣥覽法師碑集古錄唐徐安貞撰禇庭誨書碑以開元二十五年立在杭州嘉興府碑記秦始皇碑九州要云始皇登秦望山望海今始皇碑在嘉興縣六里山石刻在海鹽刻云天册元年旃䝉恊洽之嵗孟冬陽月日惟壬寅朔石簣神匱忽自開發拾得青玊璽篆文吳即帝位共三十八字秀道者塔碑張伯玉百韻詩序云今有塔銘存焉東漢烈士沈光書迹石刻張伯玉百韻詩注云在聖果寺周氏墓碑在海鹽唐貞元十四年汝南縣君周氏墓誌銘植於嘉興縣東界海鹽齊景鄉寳花尼寺碑今碑刻猶存僅可讀大厯丙申嵗夏五月七日崇福團寺記在崇德縣西八十歩有唐無著禪師贊寧碑記陸府君碑在海鹽縣北五十五里當湖市近得一石刻乃唐吳郡陸府君墓銘齊景公廟碑在海鹽縣齊景鄉也唐貞元十四年汝南縣君周氏墓誌銘植於嘉興縣東界海鹽縣齊景公鄉華亭吳征北將軍碑宣城内史碑嘉禾王總管守城記侯渙文曺史君廟記吳感文髙史君廟記崔拱臣文靈光寺僧靈祐塔銘沈亞之文法雲寺碑在華亭縣南三十五里大唐蘓州華亭縣顧亭林市新創法雲禪院記大中十四年嵗在庚辰吳興沈瑊述并書又亭林法雲寺感夢伽藍神記又開運元年造寺成二僧夢云梁朝侍即至忽見紫衣曰此吾故宅也明夜復夢云但尋古碑文為據明早求之果見碑文云寺南髙基顧野王曽於此修輿地志遂建屋立像曰顧侍郞祠慶厯六年記云資聖院碑在嘉興縣唐宣宗書字額尚存萬年宫額天祐元年武肅王重書額現存天慶觀碑掘得二小石刻其一北極殿記知州宋坦雍熈三年記并銘其一天慶觀碑記解九臯撰徐鉉銘石篆書三十八字吳歸命侯天册元年刻在海鹽之六里鄉開元鐘梁朝繪七寳上帝像乾道中開齋堂掘得開元鐘梁朝繪七寳上帝像乃鐫像於石嘉禾志并詩郡守張元成序武原志即海鹽圖經令蘓養直序雲間志華亭令楊偕編安吉州碑記漢故梁相費府君碑在墨玅亭集占錄隸書不著書撰人名氏碑不載其鄉里及刻石年月漢故堂邑令費君碑在墨玅亭又一碑亦在號三費碑漢費鳯碑集古錄云漢石勩撰隸書不著名氏文悉為五字句亦無所立年月吳興太守廟碑吳赤撰晁公武合州㕔壁記云刺史㕔壁記始於唐而顧況元結之文最為著按吳氏所記五百餘人而名德如謝安石顏清臣之徒傑然表見於史籍者凢數十公故其地冠簪之盛常數天下三分之一白蘋洲五亭記在墨玅亭唐白居易撰馬纘書開成四年建又見金石錄白蘋亭記在墨玅亭唐李直方撰史鎬書元和元年作白蘋洲記在州大㕔壁中中和五年刺史孫儲撰王溥書湖州紀功記在甲仗庫唐元和中紀刺史辛泌平李錡也吳大皇帝廟碑在廟中唐安定中立胡李良撰太和中大寧寺建功德碑在報恩寺韓罩撰徐浩書大厯六年建袁高茶山詩述在墨玅亭唐于頔撰徐璹書述刺史袁髙所作茶山詩集古錄云唐袁髙撰徐璹書湖州之顧渚山嵗修茶貢髙為之刺史而作是詩其後于頔得之於壊垣為之序而刻之貞元七年立又碑隂李吉甫撰貞元十年建烏程令韋公徳政碑在烏程縣治唐至徳二年沈務本撰沈仲昌書沈府君墓銘在墨玅亭乾元元年韋卓撰并書胡夫人墓銘在墨玅亭天復三年于景林撰并書金氏墓銘在墨玅亭李翊述并書吳氏墓銘在墨玅亭太和九年胡季良書斷碑二在墨玅亭一咸通五年立僧翰書一乾元元年鄔彫書唐太光和尚神異碑在烏程法華寺乾寜中李神書唐太光和尚道蹟碑在烏程法華寺唐丞相李紳墓碑在烏程山裏乾寧三年立唐吳興丘氏墓碑在烏程縣西霅水鄉林谷元和四年立唐古山索靖廟碑在烏程本廟唐重置興國寺碑在歸安縣無為寺唐永興寺僧伽和尚碑在歸安縣鹿苑寺元和九年立唐永興寺㝠道記在歸安縣鹿苑寺咸通四年崔祐甫銘崔植誥長興縣崔趙村在罨畫溪之右崔即唐相祐甫之後家蔵韓愈所作祐甫墓銘又藏崔植崔逖等誥數軸陳周𢎞報徳寺碑在長興縣大雄寺陳徐陵報徳寺塔銘在長興縣大雄寺子院唐沙門碑赤烏五年建廟陳孝義寺碑晏公類要云徐陵撰在卞山下今在墨玅亭唐太宗御製聖教序在墨玅亭唐開元皇帝封文宣王詔在州學勅天下放生池碑舊在文宣王廟今在魯公祠集古録云唐顔真卿撰并書肅宗乾元三年詔天下自山南至浙西臨江置放生池八十一所真卿為天下放生池銘池上之碑以大厯八年立顏真卿集唐肅宗御書題碑額集古録云顔真卿書肅宗批答御書表以上元元年上碑以大厯九年立集古録云乞御書批額碑隂記顔真卿貶碑不果立至大厯中為湖州刺史始追建於州之駱駝橋東集批答御書字以為額又序其事於批答碑隂以大厯九年刻勅書褒戰功記在甲仗庫前唐憲宗賜刺史辛泌及慰問将士詔書封崇孔宣父故事在州學元和四年記徳本寺碑在文宣王碑隂胡季良撰文宣王新廟碑在州學唐大中間鄭言撰并書碑記刺史令狐綯作射堂記在墨玅亭集古録云唐顏真卿撰并書碑石壊缺不可考以大厯十二年立又云右射堂記顏真卿所書刻於石者項王廟碑隂集古録云顏氏殘碑唐顏真卿書并項王碑隂記附殘缺不全而事迹可見碑隂真卿重建項羽廟碑以大厯七年刻項生蔬食文在墨玅亭干祿字書碑二一在墨玅亭一在魯公祠集古録湖州顏魯公石記云唐人筆蹟見於今者惟公冣多其在湖州所書為世所書傳者惟干祿字書放生池碑尚多見於人家而干祿字書乃楊漢公摹其真本以訛缺遂不復傳獨余集録有之惟好古之士能知前人用意之深則其湮沉磨滅之餘尤為可惜也湖州石記集古録云碑字殘缺不見年月及書人姓名驗其字畫盖顏魯公書石柱碑舊在烏程縣西南三十里之杼山今在墨玅亭又斷碑二亦載顏真卿書晉吳興太守謝公碑在墨玅亭唐裴清撰僧道銑書大厯五年建太守厯官記在墨玅亭自晉王逸少洎陳任忠凢四十四人湖州刺史題名記唐廣徳元年李紓撰後記貞元十六年顧況作又後題貞元十七年刺史李詞靈皎城山寺碑在長興縣慈氏院元和中撰唐沙門靈皎魚陂明禪師塔銘在長興縣空隠院晉謝太傅塘碑舊碑在謝公鄉顏真卿取舊史遺文刻石而書其隂今碑在墨玅亭唐大慈寺鐘記在本寺唐縣令韓章撰吳興雜録唐志張文規作吳興録韋昭作吳興山墟名張元之作又云晉吳興太守王韶之撰三吳土地記顧長生作吳興志陸羽作吳興統記景徳中湖州攝長史左文質纂吳興詩集熙寧中知州事孫覺裒吳首興人詩自晉至唐凢二百武康土地記沈常作餘英志慶元中進士劉曈撰吳興詩金大亮序吳興續圖經紹興中編吳興志舊編淳熙中教授周世楠撰平江府碑記朱氏墓碣在吳縣西穹窿山碑已漫滅其可讀者云世居下邳自平始二年避地至此包山神景觀林屋洞碑唐開成三年建報恩寺惠敏律師碑銘台州刺史張諫撰蘇州刺史元錫書天台大徳元浩和尚靈塔頌太原少尹崔恭撰城隍廟唐碑吳郡志云城隍廟其初春申君廟唐碑具在孟郊張祜留題吳郡志云崑山古上方有丨丨丨丨丨丨云畫龍記在長事李縣㕔記周先生住山碑在洞庭山唐令狐楚撰楞伽寺石記在吳縣西南紹興間瓦礫中得房琯所作寺碑龍興寺碑在吳縣横山下山巔有塔隋時所建石記存焉旁有巨井石欄欄側有隋人記刻興福寺記在常熟縣西北九里唐寺記云始於齊始興五年按齊無始興年號但有延興中興二號皆止一年流傳之誤如此旣是唐碑姑存之寳積寺塔在横山下山頂有塔隋人所書塔銘碑石全好字畫秀整絕類虞褚顏真卿虎丘詩刻唐詩紀事二十四卷吳門有清遠道士周恭子遊虎丘詩其辭自商周厯近代二千年來矣鬼神耶隱士耶莫能測也辭藻健俊魯公愛之刻於巖際江摠碑唐詩紀事三十卷苗發送司空曙之蘇州詩云若到仁霞寺應看丨丨丨寳花寺碑集古錄一百四十五唐鄒儒立撰于頔書陸齊望有女為尼齊望捨宅為寺子渭等以永正二年造寺始成立此碑在蘇州嘉興縣春申君廟記集古錄三百二十八唐趙居正撰史惟則八分書并篆額碑以天寳十年立於蘇州重𤣥寺法華院石壁經碑文太和三年春郡守白居易記南禪院千佛堂轉輪經石記開成二年二月一日白樂天撰皇甫湜顧況詩集序序云吳中山泉氣状英淑怪麗太湖異石洞庭朱實華亭清唳與虎丘天竺諸佛寺鈎綿秀絕君出其中間翕清虚以為性結泠淡以為質吐鮮榮以為詞偏得於逸歌長句駿發踔厲徃徃若穿天心出月脇意味驚人語非尋常所能及最為快也李松已死非君誰與況字逋翁常熟唐古碣韓臯元和三年松陵集陸龜䝉圗經李宗諤修定續志朱長文編新志范成大編見言行錄松江詩集何按撰松江詩後集胡份序重廣松江集石處道序常州碑記陽羨山封禪碑雲麓澷抄云吳志天璽元年吳興陽羨山有空石長十餘丈曰石室郡表為瑞遣兼司徒董朝兼太常周處封禪國山大赦改明年為天紀即