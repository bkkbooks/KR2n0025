山詩岣嶁山尖丨丨丨字青石赤形摹竒科斗拳身薤葉披鸞漂鳳泊拏虎螭事嚴迹祕鬼莫窺石柱在耒陽縣西五十里其上有字今磨滅所可識者天寶之字而已唐文學儒林碑有大唐文學儒林碑銓德觀碑上有開元二十年衡州司馬趙頥真漢桂陽周府君碑上載東海萊陽人則碑疑在萊陽縣又有周府君碑聶氏墳石志在衡陽縣西九十里羅彥墓碑在衡陽縣西南二十里谷昕墓碑在衡陽縣東北五十里墓碑云延康五年葬於此元次山茅閣記在子城西永泰二年記元次山寒泉銘在平陽江口東巖記在合江亭東貞觀五年刺史宇文氏記覀溪記在合江亭宇文氏有銘衡陽志宋剛仲序吳九真谷府君碑集古録云𨽻書不著書撰人名氏碑以鳳凰元年立在耒陽臨海谷侯碑集古録云𨽻書不著書撰人名氏碑亦無年月不知何時立也在耒陽永州碑記大唐中興頌在祁陽浯溪石崕上元結文顔真卿書大歷六年刻俗謂之磨崖碑又按練潛闕熙寧間作笑峴亭記曰次山文章遒徑魯公筆畫闕浯皆有以驚動人耳目故中興頌寶之中州士夫家而溪之名因大稱著峿臺銘集古録云唐元結撰書不著名氏峿臺巨石也銘以大歷二年刻又有唐亭東崖浯溪石堂四銘皆結撰真書不著人名氏大歷六年刻朝陽巗記元結所刋記尚在巖下自唐迄今名公留題皆鑱於石小磨崖山谷浯溪詩後人目為丨丨丨又王明清揮麈録云崇寧三年黃魯直竄宜州泊于零陵時外祖曽空青坐鉤黨先徙是郡約逰浯溪觀中興碑太史賦詩書姓名于詩左外祖止之云某今方為流人豈可出郊公又逺徙豈可不過為之防太史從之但詩中云亦有文士相追隨蓋為外祖設秦少遊中興頌碑秦少遊詩云玉環妖血無人掃漁陽馬厭長安草潼關戰骨髙于山萬里君王蜀中老零陵志張埏序浯溪前集李仁剛編浯溪後集侍其光祖編郴州碑記義帝碑在義帝廟道州碑記漢故平郡侯相蔣君之碑在營道縣南三十里州山漢故綏民校尉騎都尉桂陽曲江長熊君之碑在營道縣北四十里龍村無為觀鐡磬文在修真第二壇無為觀其文云齊永明十年四月五日國主為一切含識造鐡磬十二枚無為洞篆刻洞在寧逺之舜溪碧虗洞元次山銘正元間李嶠篆在寧逺之永梅寺東元次山永泰二年題名在寧逺紫虗洞桞子厚記後人集徐浩書再刻道州刺史廳壁後記刺史吕溫撰唐永徽甲寅碑在天慶觀唐州魯儒碑在江華薦福寺唐太和六年立舜廟狀舜祠表圖經云江華令瞿君善篆籀元次山陽華寺等銘窊銘舜廟狀舜祠表皆其所書舊碑在懷古亭西右上有周刺史河內字有前江華令瞿令問書石之趾有二三十字末有大歷字八分書也九疑圖記永泰丙午元次山撰寒亭記元結撰瞿令問八分書亭在江華縣窊樽銘元結撰瞿令問書陽華巗銘元結撰瞿令問書以上三碑並永明二年刻集古録云道州律令要録序吕溫撰云此州法吏何洛庭良士也溫與之撮要講其義書于廳事令暉巖記唐劉夢得文天皇元年舜碑舂陵志章頴序邵州碑記古制無釋菜文在郡學濓溪周先生文修學記在郡學廣漢張栻記武夷胡宏記邵州志淳熙壬寅教授李韋之序邵陵類考郡守鞏嶸序金州碑記二妃廟記在清湘縣南漢初平二年建廟堂元和間桞宗元記盤石廟記黃庭堅文并書桂陽軍碑記盤王舊經見于太守題名韓張亭碑在臨武龍川廟碑在藍山桂永集見桂陽志太守題名下未知編集人姓名桂陽志教授鄭伸編武岡軍碑記桞子厚武岡銘見桞文都梁志鄭昉序茶陵軍碑記闕江陵府上碑記闕江陵府下碑記孫叔敖碑即楚相孫君諱饒字叔敖縣人也碑以漢延熹三年立鷂雀賦碑在枝江縣楊內翰宅係草書前有隋大業皇帝序云陳思王魏宗室子也後題云黃初三年二月記晉公安縣二聖記永和年間唐人王粲記婁至德如來聖迹曹子建碑在枝江楚莊王廟記羲之書倚相碑羲之書唐明皇注老子碑在城西開元觀乾道五年張孝祥移于府治三公廟碑唐吕湮以陶侃羊祜杜預三公聚為一廟後又祀湮于其西元結為之記云韓文公題名石刻江陵志云愈為江陵法曹當時之題名石刻存焉唐武士彠都督荆州碑按江陵舊志載武士彠貞觀中為荆州都督有白狼嘉禾出境內太宗手勑褒美此碑開禧丙寅後因修大軍倉得于地已碎裂今因見存者載之後梁宣明二帝碑堂劉禹錫撰又作詩云玉馬朝周從此辭園林寂寞對豐碑千行宰樹荆州道暮雨蕭蕭聞子規荆南節度判官廳壁記皇甫湜撰枝江縣南亭記皇甫湜撰白碑驛碑歐陽公集古録云江陵北四十里白石碑驛蓋驛側數里有後梁宣明二帝墓唐相蕭嵩為其祖立碑于驛之北因名唐楚王堤記貞元十年沙門真裕集晉王羲之書唐江陵尹吕湮廟碑衛密撰顧械書唐江陵尹吕公表集古録唐元結撰顧械書八分碑以肅宗元年立存江陵府吕公祠堂中城西開元觀斷碑查藻詩云斷碑最愛開元時上有模糊五千字法華臺記在枝江縣法華臺至道三年春鄭文寶掘地曽獲丨丨丨丨古帝寺碑在潛江縣二十里東北寺內有斷碑一截其字磨滅不可讀江陵府官石幢記唐貞元十年吳仲舒纂元豐六年得之于金鑾寺亦有黃魯直留題王師心移置于杞梓堂下經藏修造記在龍門山金鑾福昌禪寺有晉天福六年創經藏修造記見序南平髙王廟碑周顯德二年孫光憲撰今在城西三王廟前南平髙武信王神道碑王諱季興葬于江陵縣龍山鄉乾德六年陶穀撰南平髙文獻王神道碑王諱從誨葬龍山艾𨽻撰南平髙正懿王神道碑王諱保融葬龍山陶榖撰渤海髙公神道碑公諱保朂陶榖撰冦萊公祠堂碑劉敞撰唐質肅公神道碑劉贄撰渚宫故事李淑邯鄲志載渚宫舊事十卷唐余知古撰自鬻熊至唐江陵君臣人物事迹史子傳記所載者悉纂次之今有苐五卷云鄂州碑記太宗御書崔皓黃鶴樓詩石刻在州治舜帝廟碑在蒲圻縣北有斷碑載二妃事字沒滅不可考隋文帝舍利石塔銘在州東十里勝緣寺塔記云隋仁夀初文帝以釋迦如來感應舍利分布于天下建塔百所是塔為天下第一緣果道場磚塔舍利銘隋人撰近時民家掘地得之唐閬州武陵縣令翟府君墓銘貞元十一年碑今在總領所唐寧逺將軍李公墓銘貞元十三年唐扶風馬氏墓銘元和七年唐胡府君夫人朱氏墓銘太和七年唐馮府君綸墓銘太和七年唐處士韞墓銘開成三年唐薑夫人墓銘開成三年唐故鄂闕文墓銘會昌六年已上七碑皆近時掘地得之今在左軍統制衙唐寶豐院記在江夏縣東六十里本唐末貴州刺史王銃母陶氏墳庵有記乾符四年朱朴撰今記編存唐茱萸山存制大師碑銘在崇陽之金界院唐乾符乙未趙潾撰頭陀寺碑舊碑乃琅琊王簡棲撰文唐開元六年張廷圭書今亡新碑乃江南徐鍇篆額韓熙載撰碑隂今新碑存寺黃鶴樓記在黃鶴樓唐永泰中閻伯珵撰魏萬成書李陽氷篆額唐德尖山院塔記在咸寧縣西二十里唐中和三年創有古石塔鐫記猶存李陽氷篆鄂州字鄂州二字唐寶應二年李陽氷篆世傳初篆時鬼神泣空中士大夫爭摹以致逺謂可禦魑魅吳乾正二年石幢在江夏縣東南五里慈雲院有石幢刻吳乾正二年重建又有唐保大間所建殿猶存鄂州南樓磨崖記容齋四筆云慶元元年鄂州修南樓剝土有大石露于外竒崛可觀郡守吳琚見而愛之命洗剔出圭角即而諦觀乃磨崖二碑其一刻兩字上曰桞徑二尺四寸茟勢清徑下若蕃書人字惟存夫腳不可復辨或以為符或以為花押邦人至標飾置神堂香火供事或云道州學側虞帝廟內亦有之云桞君應辰是唐末五代時湖北人也其一髙丈一尺濶如其髙而加五寸刻大字八十五凡為九行其文曰乾正元年荆襄冦亂大將出陳武昌詔太守楊公出鎮後云荆江宋漢推忠輔國侍衛將軍居中記輿地碑記目卷二
