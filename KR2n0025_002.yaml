body:
  text: 輿地碑記目卷二宋王象之撰廣德軍碑記顔真卿橫山廟碑碑載自梁天監五年至唐天寶中以祈禱感應始贈水部員外郎廣德軍桐汭志郡守趙亮大序南康軍碑記夏禹石刻在上霄峰石室中世傳夏禹所刻其大如掌文皆隱起僅百餘言亦載於江州梁簡寂觀碑梁太子僕射沈璿撰唐簡寂先生陸君碑唐寶應中翰林供奉吳筠撰南唐保大中立簡寂觀碑改修靈寶殿并記改修靈寶殿并齋記唐御史大夫王路撰簡寂觀修立石路記唐掌元帥表奏徐憲撰楚王谷景德觀記朝奉郎柳宏撰唐處士顔居碣黃太史記海昏縣齋觀智顯寺竹林中所得顔家壟斷碑魯公大字清徑秀發者是也龍紀道碑唐永徽四年南山寺題鐘唐龍紀元年流霞觀記唐乾寧四年永安縣記後周顯德七年已上四處並在都昌縣雲溪觀碑南唐祕書正字宋渙撰今名祥觀貞風觀碑南唐虞部員外郎韓熙載撰碑陰有當時嬪御姓氏十餘人今名先天觀徐鉉石刻在白雲庵李仁宗嫌諱右書堂記在城西十五里南唐時李古為江州刺史作記刻於崖下今存報恩院寺額寺在福星門內軍學之西號塔院南唐李後主所書院額其碑尚存慧悟師沖照寫真讃西華湯悅撰簡寂觀新建石壇記虞部員外郎陳覺撰簡寂觀重建大殿記安西將軍張崇撰陳令舉廬山記五卷碑刻記什莫不畢載廬山續記紹聖中太守馬玗因訪廬山諸寺創始之迹出陳舜俞令舉廬山記以閲之且謂令舉書止述記者之姓字而不記其所述之文因取碑碣凡令舉所不載者名曰丨丨丨丨隆興府碑記唐豫章冠蓋盛集記獨孤及撰舊石柱記嚴撰記新石柱記來某撰韋公遺愛碑杜牧撰在觀音院滕王閣記王勃撰延壽寺碑寺在濟城徐騎省常為寺碑李衛公劍池賦在豐城縣西北寶氣亭李司空廟碑在豐城縣去縣二十五里長豐鄉司空姓李諱承鼐李神福之長子也戰沒於此因廟食焉南唐徐鉉為立碑以紀其事寶峰院記在靖安縣北石門山之寶峰院權德輿為之記唐商翺為塔銘總持寺碑容齋三筆云隆興府城內丨丨丨有一碑乾符三年牒又一紙乃中和五年牒栖霞觀記在靖安載劉懿真登仙事鄭安請為之記今碑尚存天宫寺金銅釋伽像記在城之景德院光啓二年記崇勝院古碑在新建縣洪井北二十里廣化院碑院在洪井上之翠巖韓熙載徐鉉為之立碑龍沙章江院碑在城北南唐清泉禪師居之保大四年順化韓熙載作碑文開元寺藏經寺在城東藏經皆唐經生所書梅仙觀碑在新建覀北三十里今名陽靈觀昔梅子真既以仙去嘗於山上築壇以朝斗後人立觀以奉之唐末羅隱嘗為梅先生碑法正禪師碑在新奉之石智院以元和十四年歸寂桞公權為之碑嵗久多殘缺今猶存有二三百字可讀寶雲寺碑在奉新縣東百五十步有鐵鑄菩薩五十二軀唐保大六年祕書郎陳用寬為之記今碑具焉昭德觀碑徐鉉作重建觀碑在奉新之昭德觀今碑尚存西山風雨池記貞元三年權德輿撰唐故洪州開元寺石門道一禪師塔銘權載之撰後漢徵君徐君碣銘張九齡撰北海李公放生池碑同上宋海陵王墓碑慶歷中江州江岸摧得謝朓撰正書宋海陵王墓銘石朓文固竒而書亦有法類鍾繇書石入沈括家十餘年後為夏元昭匿之不知所在江西使院小史記集古録云唐崔祐甫撰陸蔚之書開元二十二年始分江南十七州為西道宣州至于此凡十八使此碑以長慶三年立文宣王廟碑唐齊抗文權載之集云豫章舊志一卷晉會稽太守熊默撰豫章事實雷次宗撰見於崇文總目豫章古今志同上見隋書經籍志豫章記三卷南唐徐廙撰洪州圖經季宗諤編新建圗經余襄公撰職方乘洪芻編續職方乘李大異編瑞州碑記唐淨居寺碑寺在上髙縣西四十五里舊曰龍居隋開皇九年置唐貞觀三年廢大歷三年復寺有碑施肩吾文太和時進士中和二年石刻唐二賢廟在髙安縣調露鄉應智項辛敝南容祠有莆田黃滔丨丨丨丨丨丨記廟立於貞觀初元和時敝南容修之寶歷庚午里人并祀南容李德裕為袁州長史為書祠額普濟院碑院在上髙北十里武泉山南唐保大中僧義從再築有同光中記五代楊漙浮橋記在州西五龍廟下載偽吳楊漙乾正二年浮橋記云云南唐新建御名州碑在鳳凰山之碧落堂碑乃南唐保大十年立南豐曾鞏學記在州學東坡書大愚石臺山詩在本山欒城書郡圃八詠在郡圃山谷書道院賦在州治蜀江志學職雷公編髙安志郡博士辛元龍編瑞州志周徐序袁州碑記唐劉禹錫碑萍鄉楊岐山廣利禪院唐開元中廣利禪師塔劉禹錫作碑石尚存唐黃頗文宣王廟記頗宜春人為文與盧肇相上下所著者千餘篇獨郡庠文宣王廟記存袁州學記皇祐中祖無擇營建州學李泰伯為之記章友直篆桞洪書世號為三絶碑熙豐間館學第天下學記以袁為冠上真觀記在分宜南唐徐鉉為之記乘廣禪師碑集古録唐劉禹錫撰并書劉申錫篆額碑以元和二年立在袁州唐相國房公銘之隂桞子厚文有云唐之大臣以姓配公最著者曰房公相玄宗肅宗甚德袁人袁人不勝其懷李華銘公之德刺史王涯為刻銘舊宜春志童宗説編宜春新志郡守滕強恕序撫州碑記東方朔畫像贊臨川志云晉夏侯湛作初碑在德州天寶十三年平原太守顔真卿作大字勒之他石今碑在宜黃富民家凡為石六丈髙一丈五尺謝康樂翻經臺記顔魯公為之今碑已經再刻杜佑去思碑在東城三十步大歷十三年建刑部侍郎包佶文時佑為刺史張景倩清德碑在州東三十步大歷五年建顔真卿文并書篆額時景倩為刺史戴叔倫遺愛碑在州城東三十步貞元四年建時叔倫為刺史魏夫人仙壇碑晏公類要云在壇側唐大歷中年立顔真卿文元子晢遺愛碑在崇仁縣南五步大歷五年凖尚書考功苻建立刺史顔真卿文今存見晏公類要顔魯公寶蓋山記在崇化縣律藏院戒壇記集古録云唐顔真卿撰并書院壇皆僧和融所立在州之寶應寺唐撫州景雲寺故律大德上𢎞和尚石塔碑銘白樂天撰江州碑記夏禹石刻郡國志云在上霄峰石刻中世傳夏禹所刻其大如掌文皆隱起僅百餘言亦載於南康軍慧逺法師碑銘集古録宋謝靈運撰張昌序東晉末居于廬山東林碑在廬山隋廬山西林道場碑集古録渤海公撰以大業十三年立在廬山西林寺唐辨石鐘山記在州治唐太和元年李勃記太平觀使者靈廟記在本觀唐開元二十年李沘撰文使者靈驗記在太平觀開元二十年張靈官記在太平觀南唐徐鉉撰祥苻觀真人廟記保大二年南嶽朱陵道士倪少通撰東林寺碑集古録云唐李雍撰并書開元之十九年立在東林復東林寺碑集古録云唐崔黯撰桞公權書以大中十一年立在東林佛馱舍利碑集古録云唐李湜撰明乾莭書述東林興立本末在東林大孤山賦集古録云唐李德裕撰周墀篆書會昌五年刻李德裕有記同刻在廬山東林寺東林寺碑銘寺有晉唐以來碑刻及諸塔銘慶元己酉經回祿之禍間有存者西林寺道場碑在本寺隋大業十三年歐陽洵撰唐顔真卿題名在道場碑文之上唐西林齊明和尚碑在本寺太和六年唐大中題名在道場碑之上唐江州刺史裴行諷作記在明和尚碑陰大中十四年唐興果寺湊公塔元和十二年白居易撰碑唐上𢎞和尚石墳元和十年白居易撰碑唐韋應物蒲塘驛詩在德安縣驛中玊清觀碑在瑞昌縣本觀偽唐甲戌立陶狄碑在彭澤縣南門唐景龍中馬澤撰江州司馬廳記元和十三年七月八日白樂天撰江州南湖隄銘李翺撰顔魯公祖亭碑事見祖將軍廟下唐狄梁公碑在彭澤縣唐皮日休撰錢雍書潯陽志曹訓序吉州碑記大業碑人謂之故州碑吉水縣東北二十五里有故城續通典云故州城堞尚存土沒江中有龜趺在沙磧有石碑半在江秋冬水清人謂尚見大業等字香城寺碣唐皇甫湜作在郡西景德寺王藹墓碑唐平盧節度使王師範之子也事見古迹下輔順廟碑在永和鎮有周顯德五年碑廬陵縣令廳壁記唐皇甫湜撰靖居寺碑在廬陵之青原山有大中五年假成式記及天寶六年大和尚碑國慶寺經藏記在廬陵有唐太和四年經藏及開成四年郭京記顔魯公真卿題名在廬陵之青原山靖居寺吉祥院記在廬陵縣西六十里今名寶嚴院有南唐保大十五年薛良記玄寂禪師塔碑在吉水縣之龍華寺韓熙載撰朱陵觀碑在吉水縣南八十里碑徐鍇所撰齊藝亭碑在安福縣西九十五里有藝亭碑齊永明二年立其文磨滅唐李升石刻李升仕唐為安福令有讀書齋石刻今存劉史仙壇記唐咸通劉史撰禾山大舜二妃廟碑在太和縣南唐西昌令張翊撰紫陽觀新興佛碑在太和縣南唐西昌令張翊撰白鶴觀碑在太和縣西二里徐鍇撰吉州刺史廳壁記皇甫湜文廬陵香城寺碣皇甫湜文岑夫人志集古録不著書撰人名氏夫人南陽人適隴西董淑碑以廣德中立假成式廬陵官下記二卷見唐藝文志顔魯公廬陵集十卷見令狐所撰墓碑廬陵志周必大編纂贑州碑記天竺寺白樂天詩在水東三里白樂天贈韜光禪師墨迹舊存眉山老蘇嘗至寺觀焉後四十七年東坡南遷再訪惟見石刻因賦詩云香山居士留遺迹天竺禪師有故家空詠連珠并疊璧已無飛鳥及驚蛇唐鍾紹京書城東五里惠云院有臨池禪院四字乃丨丨丨丨丨大覺禪師塔銘在贑州東北一百二十里有唐長慶四年大覺禪師塔銘桞公權書之又有郡守唐扳銘及大寂師塔銘亦權德輿筆也廣澤廟碑廟在贑縣儲潭山之麓廟中石刻有唐時州刺史裴湑祈雨感應碑天王廟碑在州衙後門城樓上唐咸通二年刺史李振撰唐代石刻無恙者惟此福田院碑在雩都縣有唐咸通中進士楊知新重修寺記崇福寺碑在寧都縣東江院有修寺碑及食堂工記乃偽唐時郡人衷愈文李後主重陽詩在寧都之桃林寺寺有李後主重陽詩及禪月盡十八羅漢孫志康題名真迹存焉安國寺記在寧都縣西八里有五代末御史大夫愈安國寺記嘉濟廟碑廟在水東五里廟有唐進士楊知新偽吳薛光範二碑南唐徐鍇碑舊在天慶觀又有徐鍇施造石磬仍為之銘景德觀碑在州之景德觀徐鍇為之記徐鉉篆額焉章貢舊志曹訓序興國軍碑記唐重巖寺記在軍城景德寺唐太和元年舒元輿撰唐白巖寺記在永興縣西北白巖寺乃唐尚書右僕射中書令杜正倫撰江夏費冠卿書富川志潘廷立序寧江軍碑記毛玠之墓碑郡城西有風羲堡昔年進士陳京於圃中掘得斷碑有丨丨丨丨丨五字天慶觀殿額南唐徐騎省書曰金闕寥陽之殿今有石刻天慶觀記在軍城之天慶觀南唐徐騎省為記戲魚堂帖帖十卷元祐中寓客劉次莊輯自為法傳帖釋文十卷其帖今與潭帖武岡帖並建昌軍碑記唐麻姑仙壇記集古録云唐顔真卿撰并書碑以大歷六年立在南城縣唐小字麻姑壇記集古録云唐顔真卿撰并書記文及刻石年月與前帙所録者同而字甚小唐鄧天師碣靈昌郡太守李雍撰唐大德和尚石塔碑銘并序白居易撰唐南城縣客館記獨孤及撰唐鄧先生墓志銘鄭畋撰唐南城縣羅城記刁尚能撰南唐旴江亭記韓熙載撰建昌軍圗經李宗諤編旴江志南安軍碑記橫浦前集楊邦彥跋橫浦後集方嵩卿跤開鑿大庾嶺路序見張子夀集有云初嶺東廢路人苦峻極開元四年冬俾使臣左拾遺內供奉張九齡緣磴道披灌叢相其山谷之宜革其坂險之故揚州碑記龍興寺慎律和尚碑號四絶碑九域志云在龍興寺李華文張從申書李陽氷篆額時人謂之四絶碑姚崇立碑化德淮南郡梁山倉中記沈亞之撰漢俞鄉侯季子碑集古録云𨽻書不著書撰人名氏其碑但曰來居此邦不書郡縣之名不著所立年