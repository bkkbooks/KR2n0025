觀文新開隠山記吳武陵撰隠山六峒詩賦叙碑唐李渤撰重修靈渠記唐刺史魚孟威撰唐衡嶽道士李彌明詩刻在唐帝祠饗軍堂記栁宗元文唐大厯磨崖在堯舜祠虞帝廟碑唐李陽氷篆桂頌范成大作也桂林以桂名顧弗植桂成大始收之賓植之正夏堂植已而去郡為之詞㡬後之人勿剪伐見賓州安城志桂林志鮑同序桂林編黄豈編劉褒序桂海范石湖序嶺外代荅周喜序容州碑記元刺史奏免科率㧋在郡齋唐盧藏用碑開元四年舊在景新寺今在報恩寺十洞記吴元羙普寧志司法梁日成編唐刺史題名序郡守陶弼王慶曽思元堂詩碑見斷碑門象州碑記石羊山大字石羊山在武仙縣上有六行大字隠約如草書四傍皆無路可逹莫辨其真土人相傳為仙人留題象郡志丁世英序仙岩石刻詳見景物上仙巖下邕州碑記天威經新鑿海𣲖咸通九年静海軍管書記裴釧撰唐銅柱銘在江左右其刻云銅柱拆交人滅建武志尹安中編樂公明序太宗平蠻碑余靖文邕州馬退山茅亭記栁子厚文邕管雜記長編雍熙二年上覧丨丨丨丨歎其風俗乖異詔嶺南諸州民嫁娶䘮塟衣服製度所在長史漸加戒厲俾遵條式昭州碑記唐明皇丹霄驛詩刻驛前南面架危橋乆欲登臨畏路遥今日偶然尋得到直從平地上丹霄此明皇丹霄驛詩也南漢銅佛識報恩光孝寺殿貯銅佛一軀趺坐蓮花中五代偽劉時所鑄髙一丈二尺闊六尺座髙七尺縦闊一丈巨拇圍五寸他稱之金蓮寳座皆銅所範妙極精巧後有識云維大寳四年玉臼泉石刻在昭平縣龍門峡上有龍門峡玉臼泉六大字鄒道鄉祠堂記南軒文五瘴説梅摰作刻石在梅公亭云今觀瘴説謂仕有五瘴以急催暴歛為賦租之瘴良惡不白為獄訟之瘴昏晨酣飲為飲食之瘴侵牟民利為貨財之瘴盛陳姫妾為帷薄之瘴其意以為有一於此雖在轂下有不可逭矧其頻海之地表嶺之區耶得志軒記鄒浩張夢立字序鄒浩昭潭志韋揖編梧州碑記元結氷井銘井在州北一里唐大厯十三年容州經畧使元結過郡目曰冰井又為銘刻石泉上銘曰火山無火冰井無冰之丨丨丨丨甘寒可凝鑄金磨石篆刻此銘置泉上彰厥後生蒼梧志薛誠之編蒼梧集見集賢堂下無編集人姓名藤州碑記闕潯州碑記南海乾和白石秀林之記乾和三年嵗次乙酉奉勑鐫石王皇儀像侍衛九軀并修金籙齋慶讃記臣吳可一撰余襄公學記在慶厯中詳見修貞院記潯江志教授黄鍾序白石洞陽明觀記景祐二年立陳坦然墓記余襄公撰龔州㕔壁記潘陽石瑊撰太守題名記大觀二年郡守張浙云貴州碑記懐澤志教授譚景光序栁州碑記栁州文宣王新修廟碑栁子厚文黄柑堂碑在黄柑堂栁子厚所題詩刻今存乾明寺碑栁子厚来刺是邦而建寺有碑東亭記前人大雲寺栁宗元碑見存栁州山水記前人栁侯遺碑學有夫子廟碑盖子厚親筆乆仆無聞淳熈己酉太守趙彦禮復得舊斷碑并盖於學宫草莾間遂龕於郡治明秀堂羅池廟碑韓文公作集古録云長慶元年立靈泉寺磨崖碑王安中重修學記汪藻横州碑記闕融州碑記唐平蠻刻乆視元年玉融志楊昱天下第一真仙之巖張扵湖書賓州碑記韋厥碑智誠洞去縣四十里盖韋厥所隐之洞也碑乃廖州刺史韋敬辨所撰葛仙岩三大字在州西十五里葛仙岩安城志吳逺編化州碑記石碑亭去城六七里因陵鐡冦平紀功刻於道左連山廖顒立嵗乆碑已斷仆今郡守劉伋取石扵雷陽重刋焉唐羅州刺史馮士嵗并妻吳川郡夫人墓記二碑陵水志劉奕序譙國夫人廟碑有行狀刋於碑碣盖髙凉洗氏之女也髙州碑記誠敬夫人廟碑石極古礲錯雖不平整而其光瑩然遇天日清明迫而視之可洞見人物往来影其俗舊傳以此碑乃鑑石所製圖經教授劉棠序雷州碑記伏波將軍廟碑東坡文有兩伏波前伏波指路博徳後伏波指馬援也雷州新學記嘉祐七年余襄公文李丞相留題余謫萬安行次雷陽適海南黎冦猖獗艱阻留寓天寧丈室累月聞官軍既破賊即日戒行南渡次瓊管不三日祗奉徳音蒙恩聽還往返才一十日復天寧舊舘建炎三年嵗次己酉李綱伯紀書威武廟碑隂記故翰林蘓公謫儋耳既北歸作漢伏波將軍廟記迨今踰三十年未克建立綱以罪謫居萬安遣子宗之攝祭黙禱於神異時儻得生還當書蘓公所作碑刻石廟中以荅神貺時建炎三年李丞相綱文雷州城記胡銓南軒先生修學記前記在乾道六年再記在淳熈四年欽州碑記烏雷廟記自唐以来所有碑記今猶存廟在城外半里州學記張南軒撰寧越郡志慶元改元郡守林㑹序又簽判廖演序文亷州碑記闕欝林州碑記隠仙巖留題在南留縣壁上有元和十四年来㳺字餘不可攷唐乾符中碑北戍灘在博白縣西南一百里馬門灘之下唐咸通末安南都䕶髙駢既平蠻獠詔歸闕自海路由合浦而上經是灘險不可行又中伏巨石駢因留俸錢遺海門防遏使揚俊營治之至今舟楫通行人無難阻乾符中俊立碑以紀其事碑今存焉鬰林圖志舊記李宗鄂序新志施坤序宜州碑記闕賀州碑記龍母廟秦古碑在蒼梧門外神乃秦人碑偹述靈異蘓許公烈女碑在廟中廣陽島石刻碧雲岩在冨川縣一里岩洞邃深石壁絶髙處有石脤成三字曰廣陽島逺望分明近視如擘絮狀幽山丹甑記太和五年李郃撰惠澤侯廟碑在廟瓊州碑記乘桴浮於海賦建炎元年李丞相綱自澧移謫萬安軍已渡海至瓊而祇奉徳音聽還想必是渡海而作也瓊州學記朱晦翁作見晦公集瓊管志義大初序昌化軍碑記六無帖東坡謫儋耳貽書江浙士友云食無肉出無友居無屋病無醫冬無炭夏無寒泉見瓊管志峻靈王廟碑東坡文萬安軍碑記瓊州華逺館題壁李丞相綱以建炎二年自澧州移萬安軍十一月二十有五日南渡次瓊管後三日祇奉徳音聽還以十二月六日北歸寓華逺館凡十日載惟自唐以来宰相有罪謫海上多矣得生還者以一二數又皆積年始内徙而今者往返曽不踰旬天恩寛大感極而繼之以泣云吉陽軍碑記闕福州碑記閩遷新社記集古録云漢濮陽宁撰書為八分以大中十年立懐道闍黎頌集古録唐李邕撰并書碑以開元二十五年設立永福縣無名篆古號仙篆集古録在福州永福縣觀音院後山下世俗傳以為仙傳篆文亦有道家之言譯之者曰勤道守三一中有不死術亦莫知其是也今作三岩院重興院碑在蒜嶺西有石碑勒石馬泉三字中際香積院記院在水際里天成三年記刻石今存安國寺碑長興元年閩王所立李陽氷篆在神光寺般若䑓記刻于華嚴頂與處州新驛記縉雲縣城隍記鏡水㤀歸臺銘世寳之為四絶上生院記在州西南烏石山大中六年西院大律師碑在閩縣大乗愛同寺内羅漢堂記在大乗愛同寺顔顒書賈島章敬國師碑在閩縣方山寺懐一塔碑皇甫政撰在閩縣聖泉院開元中勑書在連江縣光化寺南澗天生寺石像記正光六年歐陽詹書毬場山亭記元和闕年馮審記東山聖泉法華院記太和四年劉軻記懐安縣天王堂記咸通六年何蟾記大姥山記乾符六年唐林嵩記恩賜琅琊郡王徳政碑乾寧三年王兢撰重修忠懿王廟碑天復元年錢昱撰永福縣髙盖名山院碑乾封嵗王蟾撰自開元勑書以下並長樂集新修神光寺碑長樂集咸通五年李勲撰雪峯寺無字碑有客題詩云一片如屏紫翠間風吹日炙蘚花斑莫言箇𠂻無文字正要常人着眼㸔雪峯真覺大師碑唐僖宗時王㴞撰烏石宣威感應王廟碑銘契丹年號陳郊撰并序長樂志云㑹同十年封長樂志又云年號史闕東陽志義烏縣真如院碑吳越㑹同十年建洪邁随筆載錢氏有年號三曰天寳寳大保正而無㑹同年號象之謹按通鑑晉天福三年嵗在戊戌契丹主耶律徳光即位改元㑹同至後漢天福十二年丁未整整十年盖是嵗福州陥於吳越錢氏是時錢氏不改年號只用中原正朔契丹入汴故用契丹年號二浙既用㑹同年號是年福州既属吳越故福州亦用㑹同年號薛老峯碑在州西烏石山頂突起三峯曰向陽峯咸通中侯官令薛逄創亭其間仍别書丨丨丨三字光禄臺碑在候官法祥院有石巋然鐫光禄吟臺四字甘棠院記在州治錢氏有土日錢昱為太守作開寳七年建善寺碑在長溪縣建隆四年吳謹辭撰太原灘留題陳武休後序云永福太原灘有太原二字不知何代人書天寳狀元䜟碑夷堅志云福州福清縣石竹山乾道三年居民夜半聞山上有聲如震雷明且山頂有大石方九丈飛落半腰間縣主李槐云山下舊有碑曰天寶石移狀元來期龍爪花紅狀元西東是嵗永福人蕭國梁魁天下永福在福清西又三年興化鄭僑繼之正在福清之東閩中名士録寰宇記云自唐設科舉塲此州才子登科者甚衆黄璞慕録閩中記慶厯二年林世知序長樂志梁克家編建寧府碑記唐貞觀中石刻在湛虗山去松溪縣南二十里分水嶺銘在崇安縣鐫於崖石上集公山石刻在建陽縣北江先生側嘗聚徒讀書側與群弟相繼登第如葉祖洽㳺酢廼其尤顯者有山齋題名勝果院記天聖中章浮象記乗風堂記北苑鳯凰山髙處有石鐫為碣字大尺許端勁有體盖慶厯戊子柯適記甌粤銘李綱序云惟甌粤之民好鬭相挺為亂及王師削平其徒盡殱議者謂甌俗生子僅留一二餘悉溺之所殺㡬何因果報應理固冝然二説雖殊實相表𠂻原其不明君臣之理盖縁不篤父子之恩平居於父子之間無虎狼之仁則臨變故之際責其守節而不為亂豈可得哉於所厚者薄則無所不薄因果報應又不論也藥石之言明著勸戒建安志張叔春序㳺先生祠堂記朱熹文泉州碑記唐暨克華州㕔壁記趙曄記唐相新六曹都堂記貞元十一年歐陽詹撰今謂之簽㕔唐相北樓記唐貞元初歐陽詹撰二公亭記唐歐陽詹撰桃林塲記太中十三年盛均撰馬懿公壁記元和二年馬摠撰王氏刺史㕔壁記保大五年黄㴞撰永春縣記開寳二年立又有江公望多假亭之記刻於碑隂惠安靈光院記天聖八年蔡襄撰萬安橋記莆陽蔡陽記并書髙士峯石像篆延福寺中有西峯即唐徴君居處有石篆題云栁公權書晉江縣瑞峯院有閣榜曰瞻部靈源之閣相傳丨丨丨丨而烏雀不敢棲其上清源集程卓命從事李方子輯為四十卷真徳秀序泉州刺史之數蔣雝王詹事祠堂記本朝建隆改元至嘉祐刺史卓然可稱者端明蔡公一人自嘉祐六年至乾道刺史卓然可稱者閣學王公一人泉州進士題名鄭侠序唐相李深之題名吕夏卿同嚴大廷老閲書北臺看唐相李深之題名慨然作詩曰一篇論諫手曾開七字題名拂緑苔莫道元和最多士㡬人曽訟左軍来清源集泉山集陳從易有泉山集二十卷事畧漳州碑記唐王諷三平大師碑唐沈懐逺碑咸通二年晉亭碑張登詩云瀟洒晉亭碑句陳元光威烈廟記唐垂拱二年漳州登科記元祐七年清源集乾道間郡守林孝澤編五代僧楚熈糧料厯蔡如松崚山南北二峯靈跡記云禮曰幽岩山狀如伏龜乃五代僧楚熈居之有陳洪進月給粮料厯蔵岩中汀州碑記唐中丞伍公墓誌正明元年舍人張䇿撰鄞江志慶元武午昭武李臯詮次林仲文序鄞江集林仲文序輿地碑記目卷三
