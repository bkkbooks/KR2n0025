body:
  text: 輿地碑記目卷三宋王象之撰常徳府碑記唐桃源碑詳載温造所述碑中唐梁山廟唐元和四年董挺撰修陽山廟碑唐太和九年刺史劉端夫賽請陽山神文又沱潜别有陽山廟董劉二碑在焉徐鍇方輿記遂謂梁松征蠻死於此遂為其神樂史寰宇記亦祖於此不知後漢書載松征蠻歸死洛陽與此所載不同赤山廟碑在沅江縣東北五十里丨丨丨有丨言光宅二年立廟天寶六年改其山為蠡山招屈亭碑唐龍朔中縣令蔡朝英重修且刻石以記其事沈公臺碑在武陵西南三里光福寺竹林中今猶存有古碑題額六字云重逰沈公臺記碑字漫滅不可讀記謂沈約為沅南令按約傳未嘗令沅南也清陵館碑在郡西西明寺寺後有臺云是李陵為臨沅令逰息於此有古碑漫滅不可讀天慶觀碑乃白雲先生管師復集桞公權體書字畫端楷人以為法天王院碑建隆元年丞相范質書桃源行容齋三筆云陶淵明作桃源記云源中人自言先世避秦時亂来此乃不知有漢無論魏晉係之以詩曰嬴氏亂天紀賢者避其世黄綺之商山伊人亦云逝願言躡輕風髙舉尋吾契自是之後詩人多賦桃源行亦不及淵明所以作記之意按宋書傳云潜自以曽祖晋世台輔耻復屈身後代自宋髙祖王業漸隆不復肯仕所著文章皆題其年月義熙以前則書晉氏年號自永初以来唯云甲子而已然余竊意桃源之事以避秦為言至云無論魏晉乃寓意於劉裕而借秦以為喻耳桃源石文夷堅志云建炎三年鼎州桃源洞石澗有文似大書而字畫皎然可識凢三十二字云無為不道天知人情無為窈㝠神見人形心言意語鬼聞人聲犯禁滿盈地鬼殛人其言雖簡而警於人世桃源山界記集古録云唐狄中立撰徐元書并篆額開成五年立賽陽山文集古録云唐劉端夫禱陽山文凡五首不著書人名氏以太和九年立武陵北亭記劉禹錫撰圖經郡守胡介序岳州碑記湘夫人碑岳陽志云黄陵廟前有荆州對表題云丨丨丨丨庭有斷碑晉太康九年立額題曰虞舜二妃之碑元和十四年韓愈過而禱焉無姓和尚碑報恩光孝寺舊名聖安即桞宗元丨丨丨丨丨所著者也石壁篆文岳陽志曰平江縣有昌江山真人艾君居之石崕壁立有篆文夏禹治水嘗至於此君山神祠堂記懿宗咸通四年巴陵令李宻思撰桂陽闕陳闕樵桂亭記滕宗諒撰江心小石詩蛟室圍青草龍堆擁白沙䕶江蟠古木迎棹舞神雅破浪南風正收帆畏日斜雲山千萬叠底處上仙槎王直方云此老杜過洞庭湖詩也李希聲云得之於江心一小石刻潘子真云元豐間有人得此石刻於洞庭湖中而不載名氏或以示山谷曰子羙作也今蜀本已收入集而不記其得詩之由故録其詳於此黄陵廟碑集古録云韓愈撰沈傳師書長慶元年立夏侯宋客墓碑夏侯宋客為岳州刺史墓碑見在華容鎮北一里元次山文事見鄂州舊圖經幕阜山記在平江縣記曰山有石壁刻銘上言禹治水登此山髙於平地二千有八百丈周五百里四絶碑滕宗諒守岳取岳陽楼古今賦詠刻石於上范文正公為之記蘓舜欽子羙書其丹邵餗篆其首時稱丨丨丨澧州碑記雙泉僧石碑寰宇記澧陽縣雙泉有髙僧修行於此有石碑缺落慈雲禪寺碑即澧陽藥山寺唐光啟二年雷滿奏立寺額斷碑尚存香積縣石碑在澧陽縣西一里有古冢及古碑漫滅不可讀惟額存三大字曰石墓誌不知其為誰氏也藥山牛欄八字石碑不知嵗月刻石藥山田朝奉墓銘在石門縣元豐五年蘇頌文柿木成文太平字言行録富弼言澧州丨丨丨丨有丨丨丨公言今四海騷然未見太平之象請不宣示於外靖州碑記唐久視中古碑圖經云元豐癸亥通道于廣西于溪旁得古碑乃唐乆視中碑詳見鑿字溪下峡州碑記廢汶陽觀碑寰宇記云在逺安縣梁大通五年荆州刺史湘東王繹碑李刺史墓碑隋大業五年𦵏在廢狠山縣南舊經云墓前有碑篆盖云南郡太守李己酉墓曹王臯墓在廢狠山縣西六十里正元中丨丨丨為江陵節度荆州記云李曹王江陵節度使死𦵏焉李冢石碑荆州記云縣長南陽張朔撰在廢狠山縣南缺落不可辨李將軍墓經幢在清江北霧洞山李景盛嘗事髙季興髙氏納土守義以死子孫因家墓傍有經幢可攷歸州碑記古松枝碑在髙陽鄉朱家村碑在樹上去地十許丈相傳云昭君祖冢碑石柱廟碑廟在秭歸縣之長城郷栢長村唐黄魔神廟記載唐蘭陵公自右史竄黟南泝峡夢神將祐助公出郡紀載甚詳乾符丁巳司户袁循記今其碑在紫極宫又有譽鄉磨崕趙公記及張無盡正訛碑載李吉甫及冦莱公舟行皆獲神之助云玉虗洞碑有唐碑一片在洞門崕石之下混元皇帝像在郡西五里天慶觀開元二十九年牛仙客奏置天寳元年劉守滔刻之石唐元皇帝像及唐銅鐘在郡北龍興觀内有元皇帝像及唐儀鳯二年歸州刺史勤寄生所造銅鐘重十斤懐忠堂記至和中蔣㮣作丨丨丨丨謂戰國距今作者如宋玉則止于辨王褒止于懐劉向止于嘆賈誼止于弔皮日休止于諷梁竦則止于悼騷而已楊雄大儒猶曰遇不遇命也何必捐身哉不知先生之心三仁之心也蔣槩有三㳺洞記與周茂叔俱㳺則取友必端矣辰州碑記銅柱銘在㑹溪城晉天福五年溪州刺史彭士愁納土求銘楚王馬希範請于朝以立之學士李臯為之銘五代史謂之彭士然者字之訛也當以丨丨丨為正景星寺碑安福寺在沅陵縣城外西南隅寺有盧蔵用所撰寺碑猶存義蓮塘石刻淑浦紅旗石壁間有義蓮塘三字石刻存瞿栢庭記長慶二年刺史温造刻石記其事于桃源復州碑記㑹景石上題唐朝竇史君名夢野亭記景祐五年郡守王琪撰夢野亭詩景祐間諸賢所作蘭亭記藁石刻太守何公榘刻陸鴻漸煎茶碑見人物門陸文學傳集古録唐劉㝠鴻書陸羽自叙也劉虗白以羽自傳并李陽冩真讃又為後叙附咸通十五年刻石在復州龍盖寺碑集古録唐徐元弼撰王辭書碑以開成五年立在復州徳安軍碑記晉董黯墓碑圖經云即董城在孝感縣北一百三十里昔孝子董黯家焉故後魏大統十六年改為董城郡然明州慈溪縣亦有孝子董黯墓唐徐浩所書碑碣見存當考玉碑唐史云州東十八里有宰相村即唐許氏墓昔人因發地𦵏獲一碑石即孝昌公許君墓碑治平中郡守周爕以其石類玉以為玉碑自其墓輓入城易以他刻磨去其文視之非玉也鄭獬遽止之已無及矣金泉寺唐碑寺在府西五里有石浮圖九級上鐫數百字周武後延載元年安陸縣逹等所建李徳碑歐陽公集古録云徳自安州刺史遷神武大將軍而史不書獨見此碑荆州軍碑記䝉泉題詠序由沈傳師而下得五十七人朱震序後梁宣明二帝碑在長林縣南一百五十里唐韓林撰沈約墓碑在本軍管通判家玉泉二碑其一邵了明其一李安期玉泉山大通碑唐神武皇帝所題唐正元玉泉廟記大理評事董挺三星院石塔刻在當陽縣東莒堰其石柱刻云唐貞元十七年𦵏智夀和尚舎利塔餐霞觀碑在當陽縣之圓臺有丨丨丨基乃陳宗遜撰庾逺書碑字剥落其碑中前梁尚書侍中基州長史云云三王城古碑在當陽縣之緑林山漢王匡王鳯王常之所屯故曰三王城城中有故碑字缺落石馬洞碑在花溪之下淯溪之上其廟神即闗王也五代間有斷碑尚存永興觀碑在當陽縣後街唐元和中立唐南泉大雲寺蘭若和尚碑天寶中作唐玉蘂詩集古録云在荆門惠泉寺唐沈傳師李徳裕唱和也闗將軍祠堂記集古録云唐董挺撰張積書以貞元十八年立二聖金剛碑集古録云唐瞿撰書開元中有史清者過洞庭遇風將溺潜儔之見二神移其舟於沙上而免由是往來行旅皆禱祠之碑以元和三年立漢陽軍碑記晉征南將軍胡奮碑元和郡縣志云在魯山南平將軍黄廣之碑寰宇記云在魯山為討杜魯刻石以記事信陽軍碑記唐李刺史墓神道碑刺史名鳯在郡城東南隅大厯中為申州刺史有神道存焉字漫滅不可讀舊圖經教授鄔徳麟編新圖經郡守闗良臣序夀昌軍碑記梁武王華容寺碑在武昌西山唱和石刻在武昌夏侯宋客墓表唐元結撰在武昌縣惠公禪居表元結撰在武昌縣窊樽銘在武昌縣東方山石刻在武昌之東方山有石刻云漢東方朔之故隠也怡亭記蔣武竒序怡亭銘刻於江濵巨石之上至今存焉乃永㤗元年李陽氷篆季莒八分書裴虬作銘唐令君馬向石刻在石門郭祥正詩云雙崕屹然起剔蘚認題識又注云石刻存焉退谷銘丨丨丨序云杯湖西南是退谷杯湖銘序云杯湖東抵杯樽西浸退谷北匯樊水南涯郎亭襄陽府碑記漢𤣥儒婁先生碑舊在榖城今移在光化軍漢南陽太守秦頡碑碑在今宣城縣故墻下漢郭先生碑在榖城歐陽公集古録云嵗月未詳不見書撰人姓名在襄州榖城縣東漢襄陽太守胡烈碑皇朝郡縣志云在南漳縣之固城諸葛武矦故宅碣晋李興撰魏劉熹學生冢碑集古録云文字磨滅其間有稱大魏而有學生名百餘熹嘗歴榖城令學者從之受業而歿者悉𦵏之謂之學者冡在榖城縣晉南陽太守司馬整碑闕晉南鄉太守頌在今副都統司墮淚碑寰宇記云在襄陽縣東九里晉羊祜之鎮襄陽有功徳於人百姓于峴山建碑立廟嵗時享祭望其碑莫不流涕杜預因名曰丨丨丨梁改墮淚碑梁大同十年太常卿劉之遴撰今在羊祐碑之隂梁檀溪寺禪房碑集古録云梁劉建之撰沙門道安重建天監十一年立後梁修峴山亭記在峴首陳伏波將軍墓誌序并碑隂在府治後周儀同碑周元年宇文周碑今在襄陽縣民董氏家按通鑑宇文周立國之初但稱王不建年號至陳武帝永定三年崔猷建議請稱皇帝建年號始改元武成故此碑但稱元年則此碑之立當尚在武成之前後周席肅公神道保定四年卒碑今在府治周襄州静真觀碑今在府中隋鳯林寺興國寺碑集古録鳯林寺碑庾信撰又李徳林製興國寺碑隋開皇中立今在襄陽縣延夀寺隋啟法寺碑集古録云隋丁道䕶書仁夀二年立隋故處士羅君墓誌銘在府治容齋隨筆云其字畫勁楷類禇河南然其父子皆名清為不可暁龍朔二年立唐啟法寺金銅無量像碑張昌齡文永淳二年建碑今在襄陽之龍興寺唐阿陁經碑無年月在襄陽之龍興寺周襄州静真觀碑何彦先撰登封元年立碑在府中武后時碑也唐旌表尹孝子碑張東之文萬嵗通天二年立今在府中集古録云天寶五年立唐襄州編學禪寺碑韋承慶撰鍾紹京書開元二年立集古録云在襄州今在轉運司愛峴閣下唐裴公碑開元八年建在峴山唐靳公遺愛碑張九齡撰今在峴山唐獨孤府君碑集古録云李邕撰蕭誠書誠書世多有而此尤佳碑今在峴山唐金剛經石幢唐開元二十六年建碑在龍興寺唐故襄州處士孟君墓碣銘唐樊澤撰碑今在谷隐寺唐放生池石柱記集古録云天寳十載李憕記在府城小北門外唐宜城驛記元和十四年韓愈撰唐新學記貞元五年立盧群文在府學唐侍中王粲石井欄記集古録云貞元十七年於頓撰胡証書上元二年来瑱移井欄置於刺史官舍甄濟撰彭朝議書碑在都統司内樊公遺愛碑李絳撰元和八年立在於治中唐髙廟詩碑㑹昌五年立碑在府治唐蜀丞相諸葛公碑大中三年李景遜撰今在隆中唐漢光武新廟祝文大中八年李景遜撰今在襄陽之八叠唐羊公及改墮淚碑大中九年李景遜重立碑在峴山唐置延慶禪院碑蔣係撰今在延慶寺唐延慶洞行記唐咸通蔣係盧㴞等㳺山新題碑今在延慶寺唐東海徐公徳政頌李隙撰咸通六年在峴山唐相國徐公辭立碑表咸通九年立在峴山唐聞喜亭記趙璘撰記在子城上唐故雲麾將軍宗公墓誌咸通九年立在張王廟唐新修後漢荆州劉公廟碑劉權撰廣升二